version: '3.8'
services:
  ba-modding-toolkit-web:
    build:
      context: .
      args:
        GIT_TAG: ${GIT_TAG:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: jacksen168/ba-modding-toolkit-web:latest
    container_name: ba-modding-toolkit-web
    network_mode: bridge
    ports:
      - "8200:80"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/bamt.db
      - DEBUG=false
      # CORS settings (optional, defaults to allow all origins)
      # - CORS_ORIGINS=https://yourdomain.com,https://www.yourdomain.com
      # - CORS_ALLOW_CREDENTIALS=true
      # - CORS_ALLOW_METHODS=GET,POST,DELETE
      # - CORS_ALLOW_HEADERS=Content-Type,Authorization
    restart: unless-stopped
